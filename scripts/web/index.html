<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma 4 Local Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">Gemma Local</div>
        <button id="newChatBtn" class="new-chat-btn">+ 새 채팅</button>
        <div class="sidebar-note">
          <div>모델</div>
          <code id="modelName">gemma4:e4b</code>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Gemma 4 Chat</h1>
          <span class="status" id="statusText">준비됨</span>
        </header>

        <section class="chat-area" id="chatArea">
          <div class="message assistant">
            <div class="message-role">Assistant</div>
            <div class="message-content">
              안녕하세요. 로컬 Gemma 4와 연결되어 있습니다. 질문을 입력해 주세요.
            </div>
          </div>
        </section>

        <form id="chatForm" class="composer">
          <textarea
            id="promptInput"
            rows="1"
            placeholder="메시지를 입력하세요..."
            required
          ></textarea>
          <button type="submit" id="sendBtn">전송</button>
        </form>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
